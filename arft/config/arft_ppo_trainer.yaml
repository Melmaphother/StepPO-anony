# AgentRFT PPO trainer config.
# Inherits verl's ppo_trainer.yaml and only overrides the necessary parts.

defaults:
  # Inherit the full verl ppo_trainer config.
  - ppo_trainer

  # Override the rollout config to use arft's AgentFlowConfig.
  - /overrides/rollout@actor_rollout_ref.rollout

  # _self_ ensures this file has priority.
  - _self_

# Add any additional config overrides here if needed.
# Example:
# actor_rollout_ref:
#   rollout:
#     agent:
#       num_workers: 16
